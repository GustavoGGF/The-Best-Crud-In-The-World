export default "<div\n  [routerLink]=\"['/', direction]\"\n  class=\"group cursor-pointer bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-{{\n    color\n  }}-500 transition-all\"\n>\n  <div class=\"flex items-center justify-between mb-4\">\n    <div\n      class=\"p-3 bg-{{ color }}-100 rounded-lg text-{{\n        color\n      }}-600 group-hover:bg-{{\n        color\n      }}-600 group-hover:text-white transition-colors\"\n    >\n      <svg\n        class=\"w-6 h-6\"\n        fill=\"none\"\n        stroke=\"currentColor\"\n        viewBox=\"0 0 24 24\"\n      >\n        <path\n          stroke-linecap=\"round\"\n          stroke-linejoin=\"round\"\n          stroke-width=\"2\"\n          d=\"id-badge-icon-path...\"\n        />\n      </svg>\n    </div>\n    <span class=\"text-xs font-semibold text-gray-400 uppercase\">{{\n      typeConfiguraion\n    }}</span>\n  </div>\n  <h2 class=\"text-xl font-bold text-gray-800\">Perfis de Sistema</h2>\n  <p class=\"text-gray-500 mt-2\">\n    {{ description }}\n  </p>\n  <div class=\"mt-4 flex items-center text-{{ color }}-600 font-medium\">\n    Acessar CRUD <span class=\"ml-2\">→</span>\n  </div>\n</div>\n"
