export default "<div class=\"mb-8\">\n  <label class=\"block text-sm font-semibold text-gray-700 mb-4\"\n    >Perfis de Sistema (Mínimo 1)</label\n  >\n\n  <div class=\"grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4\">\n    <div\n      *ngFor=\"let perfil of perfisDisponiveis\"\n      class=\"flex items-center p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer\"\n    >\n      <input\n        type=\"checkbox\"\n        [id]=\"'perfil-' + perfil.id\"\n        [value]=\"perfil.descricao\"\n        (change)=\"onCheckboxChange($event, perfil)\"\n        [checked]=\"isProfileSelected(perfil.descricao)\"\n        class=\"w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer\"\n      />\n      <label\n        [for]=\"'perfil-' + perfil.id\"\n        class=\"ml-3 text-sm text-gray-700 font-semibold cursor-pointer select-none uppercase\"\n      >\n        {{ perfil.descricao }}\n      </label>\n    </div>\n  </div>\n\n  <div\n    *ngIf=\"perfisFormArray?.invalid && userForm?.touched\"\n    class=\"text-red-500 text-xs mt-3 italic\"\n  >\n    * Selecione ao menos um perfil para este usuário.\n  </div>\n</div>\n"
