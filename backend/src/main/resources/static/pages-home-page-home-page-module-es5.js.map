export default "<div class=\"min-h-screen bg-gray-50 p-8\">\n  <header class=\"max-w-5xl mx-auto mb-10\">\n    <h1 class=\"text-3xl font-extrabold text-gray-900\">\n      Configurações do Sistema\n    </h1>\n    <p class=\"text-gray-600\">\n      Selecione qual módulo deseja gerenciar no momento.\n    </p>\n  </header>\n  <main class=\"max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6\">\n    <app-create-card\n      [direction]=\"'profile'\"\n      [typeConfiguraion]=\"'Gestão de Perfis'\"\n      [description]=\"\n        'Defina os níveis de acesso e descrições das funções do sistema.'\n      \"\n      [color]=\"'blue'\"\n    ></app-create-card>\n    <app-create-card\n      [direction]=\"'user'\"\n      [typeConfiguraion]=\"'Gestão de Usuários'\"\n      [description]=\"\n        'Gerencie os usuários e vincule-os aos perfis cadastrados.'\n      \"\n      [color]=\"'green'\"\n    ></app-create-card>\n  </main>\n</div>\n"
