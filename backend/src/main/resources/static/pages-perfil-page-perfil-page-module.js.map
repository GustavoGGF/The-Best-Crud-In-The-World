export default "<div class=\"border rounded-lg overflow-hidden\">\n  <ul class=\"divide-y divide-gray-200\">\n    <li\n      *ngFor=\"let item of items\"\n      class=\"p-4 hover:bg-gray-50 flex justify-between items-center gap-4\"\n    >\n      <div class=\"flex gap-4\">\n        <span class=\"font-bold text-blue-600\">#{{ item.id }}</span>\n        <span class=\"text-gray-700\">{{ item.descricao }}</span>\n      </div>\n\n      <button\n        (click)=\"editProfile(item)\"\n        class=\"flex items-center gap-1 px-3 py-1 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-md transition duration-200\"\n      >\n        <svg\n          xmlns=\"http://www.w3.org/2000/svg\"\n          class=\"h-4 w-4\"\n          fill=\"none\"\n          viewBox=\"0 0 24 24\"\n          stroke=\"currentColor\"\n        >\n          <path\n            stroke-linecap=\"round\"\n            stroke-linejoin=\"round\"\n            stroke-width=\"2\"\n            d=\"M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z\"\n          />\n        </svg>\n        Editar\n      </button>\n    </li>\n\n    <li\n      *ngIf=\"!items || items.length === 0\"\n      class=\"p-8 text-center text-gray-500 bg-gray-50\"\n    >\n      <div class=\"flex flex-col items-center gap-2\">\n        <svg\n          xmlns=\"http://www.w3.org/2000/svg\"\n          class=\"h-8 w-8 text-gray-400\"\n          fill=\"none\"\n          viewBox=\"0 0 24 24\"\n          stroke=\"currentColor\"\n        >\n          <path\n            stroke-linecap=\"round\"\n            stroke-linejoin=\"round\"\n            stroke-width=\"2\"\n            d=\"M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4\"\n          />\n        </svg>\n        <span>Nenhum registro encontrado.</span>\n      </div>\n    </li>\n  </ul>\n</div>\n"
