export default "<div\n  class=\"max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100\"\n>\n  <div class=\"flex justify-between items-center mb-6\">\n    <h2 class=\"text-2xl font-bold text-gray-800\">Perfil do Usuário</h2>\n    <span\n      class=\"px-3 py-1 text-xs font-semibold text-blue-600 bg-blue-100 rounded-full uppercase\"\n      >Status: Ativo</span\n    >\n  </div>\n  <form [formGroup]=\"perfilForm\" (ngSubmit)=\"salvar()\">\n    <div class=\"mb-4\">\n      <label class=\"block text-sm font-medium text-gray-700 mb-2\"\n        >Descrição Profissional</label\n      >\n      <textarea\n        formControlName=\"descricao\"\n        [readonly]=\"!isEditing\"\n        [ngClass]=\"\n          !isEditing\n            ? 'bg-gray-50 border-gray-200'\n            : 'bg-white border-blue-500 ring-2 ring-blue-200'\n        \"\n        class=\"w-full p-3 border rounded-lg focus:outline-none transition duration-200 min-h-[120px] resize-none\"\n        placeholder=\"Digite sua descrição...\"\n      ></textarea>\n\n      <p\n        *ngIf=\"\n          perfilForm.get('descricao').invalid &&\n          perfilForm.get('descricao').touched\n        \"\n        class=\"text-red-500 text-xs mt-1\"\n      >\n        A descrição deve ter pelo menos 10 caracteres.\n      </p>\n    </div>\n\n    <div class=\"flex justify-end gap-3 mt-6 border-t pt-4\">\n      <ng-container *ngIf=\"!isEditing; else editingButtons\">\n        <button\n          type=\"button\"\n          (click)=\"isEditing = true\"\n          class=\"px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition\"\n        >\n          Editar\n        </button>\n        <button\n          type=\"button\"\n          (click)=\"excluir()\"\n          class=\"px-4 py-2 border border-red-200 text-red-600 rounded-lg hover:bg-red-50 transition\"\n        >\n          Limpar\n        </button>\n      </ng-container>\n\n      <ng-template #editingButtons>\n        <button\n          type=\"button\"\n          (click)=\"cancelar()\"\n          class=\"px-4 py-2 text-gray-600 hover:text-gray-800 transition\"\n        >\n          Cancelar\n        </button>\n        <button\n          type=\"submit\"\n          [disabled]=\"perfilForm.invalid\"\n          class=\"px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 transition shadow-lg shadow-green-200\"\n        >\n          Salvar Alterações\n        </button>\n      </ng-template>\n    </div>\n  </form>\n</div>\n"
