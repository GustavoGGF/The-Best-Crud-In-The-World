<div
  [routerLink]="['/', direction]"
  class="group cursor-pointer bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-{{
    color
  }}-500 transition-all"
>
  <div class="flex items-center justify-between mb-4">
    <div
      class="p-3 bg-{{ color }}-100 rounded-lg text-{{
        color
      }}-600 group-hover:bg-{{
        color
      }}-600 group-hover:text-white transition-colors"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="id-badge-icon-path..."
        />
      </svg>
    </div>
    <span class="text-xs font-semibold text-gray-400 uppercase">{{
      typeConfiguraion
    }}</span>
  </div>
  <h2 class="text-xl font-bold text-gray-800">Perfis de Sistema</h2>
  <p class="text-gray-500 mt-2">
    {{ description }}
  </p>
  <div class="mt-4 flex items-center text-{{ color }}-600 font-medium">
    Acessar CRUD <span class="ml-2">→</span>
  </div>
</div>
