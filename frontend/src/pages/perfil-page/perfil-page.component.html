<div
  class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100"
>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Gerenciar Perfis</h2>

    <span
      [class]="
        isEditing ? 'text-blue-600 bg-blue-100' : 'text-green-600 bg-green-100'
      "
      class="px-3 py-1 text-xs font-semibold rounded-full uppercase"
    >
      {{ isEditing ? "Editando Registro #" + isEditing : "Novo Registro" }}
    </span>
  </div>

  <form [formGroup]="perfilForm" (ngSubmit)="sendData()">
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2"
        >Descrição do Perfil</label
      >
      <input
        type="text"
        formControlName="descricao"
        class="w-full p-3 border rounded-lg focus:outline-none transition duration-200 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
        placeholder="Ex: Administrador, Gerente..."
      />

      <p
        *ngIf="
          perfilForm.get('descricao').invalid &&
          perfilForm.get('descricao').touched
        "
        class="text-red-500 text-xs mt-1"
      >
        A descrição deve ter pelo menos 5 caracteres.
      </p>
    </div>

    <div class="flex justify-between mt-6">
      <div>
        <button
          *ngIf="isEditing"
          type="button"
          (click)="deleteProfile()"
          class="px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-medium transition duration-200 flex items-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            />
          </svg>
          Excluir
        </button>
      </div>

      <div class="flex gap-3">
        <button
          *ngIf="isEditing"
          type="button"
          (click)="clearForm()"
          class="px-6 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition"
        >
          Cancelar
        </button>

        <button
          type="submit"
          [disabled]="perfilForm.invalid"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 transition shadow-lg shadow-blue-200"
        >
          {{ isEditing ? "Atualizar Perfil" : "Adicionar Perfil" }}
        </button>
      </div>
    </div>
  </form>

  <div class="mt-10 pt-6 border-t border-gray-100">
    <h3 class="text-lg font-semibold text-gray-700 mb-4">
      Perfis Disponíveis no Sistema
    </h3>
    <app-generator-list
      [profilesList]="profiles"
      (onEdit)="editProfile($event)"
    ></app-generator-list>
  </div>
</div>
