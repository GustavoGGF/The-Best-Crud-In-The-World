<div
  class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100"
>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Perfil do Usuário</h2>
    <span
      class="px-3 py-1 text-xs font-semibold text-blue-600 bg-blue-100 rounded-full uppercase"
      >Status: Ativo</span
    >
  </div>
  <form [formGroup]="perfilForm" (ngSubmit)="salvar()">
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2"
        >Descrição Profissional</label
      >
      <textarea
        formControlName="descricao"
        [readonly]="!isEditing"
        [ngClass]="
          !isEditing
            ? 'bg-gray-50 border-gray-200'
            : 'bg-white border-blue-500 ring-2 ring-blue-200'
        "
        class="w-full p-3 border rounded-lg focus:outline-none transition duration-200 min-h-[120px] resize-none"
        placeholder="Digite sua descrição..."
      ></textarea>

      <p
        *ngIf="
          perfilForm.get('descricao').invalid &&
          perfilForm.get('descricao').touched
        "
        class="text-red-500 text-xs mt-1"
      >
        A descrição deve ter pelo menos 10 caracteres.
      </p>
    </div>

    <div class="flex justify-end gap-3 mt-6 border-t pt-4">
      <ng-container *ngIf="!isEditing; else editingButtons">
        <button
          type="button"
          (click)="isEditing = true"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
        >
          Editar
        </button>
        <button
          type="button"
          (click)="excluir()"
          class="px-4 py-2 border border-red-200 text-red-600 rounded-lg hover:bg-red-50 transition"
        >
          Limpar
        </button>
      </ng-container>

      <ng-template #editingButtons>
        <button
          type="button"
          (click)="cancelar()"
          class="px-4 py-2 text-gray-600 hover:text-gray-800 transition"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="perfilForm.invalid"
          class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 transition shadow-lg shadow-green-200"
        >
          Salvar Alterações
        </button>
      </ng-template>
    </div>
  </form>
</div>
