<app-navbar-component></app-navbar-component>
<div
  class="max-w-3xl mx-auto mt-10 p-8 bg-white rounded-2xl shadow-xl border border-gray-100"
>
  <div class="flex justify-between items-center mb-8 border-b pb-4">
    <h2 class="text-3xl font-extrabold text-gray-900">Gerenciar Usuários</h2>
    <span
      [class]="
        isEditing ? 'text-blue-600 bg-blue-100' : 'text-green-600 bg-green-100'
      "
      class="px-3 py-1 text-xs font-semibold rounded-full uppercase"
    >
      {{ isEditing ? "Editando Usuário #" + isEditing : "Novo Registro" }}
    </span>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="sendData()">
    <div class="mb-8">
      <label class="block text-sm font-semibold text-gray-700 mb-2"
        >Nome Completo</label
      >
      <input
        type="text"
        formControlName="name"
        class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition border-gray-300"
        [ngClass]="{ 'border-red-500': isFieldInvalid('name') }"
        placeholder="Digite o nome completo do usuário"
      />

      <div
        *ngIf="userForm.get('name').invalid && userForm.get('name').touched"
        class="text-red-500 text-xs mt-2"
      >
        <p *ngIf="userForm.get('name').errors?.required">
          O nome é obrigatório.
        </p>
        <p *ngIf="userForm.get('name').errors?.minlength">
          O nome deve ter no mínimo 10 caracteres.
        </p>
      </div>
    </div>

    <app-profile-checkbox
      [perfisDisponiveis]="perfisDisponiveis"
      [perfisFormArray]="perfisFormArray"
      [userForm]="userForm"
      (onEdit)="currentProfile($event)"
      [selectedPerfis]="userSelectedPerfis"
    ></app-profile-checkbox>

    <div class="flex justify-between pt-6 border-t">
      <div>
        <button
          *ngIf="isEditing"
          type="button"
          (click)="deleteUser()"
          class="px-6 py-3 text-red-600 bg-red-50 hover:bg-red-100 font-bold rounded-xl transition flex items-center gap-2"
        >
          Excluir Usuário
        </button>
      </div>

      <div class="flex gap-3">
        <button
          *ngIf="isEditing"
          type="button"
          (click)="clearForm()"
          class="px-6 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition"
        >
          Cancelar
        </button>

        <button
          type="submit"
          [disabled]="userForm.invalid"
          class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all shadow-lg shadow-indigo-200"
        >
          {{ isEditing ? "Atualizar Usuário" : "Finalizar Cadastro" }}
        </button>
      </div>
    </div>
  </form>

  <div class="mt-12 pt-8 border-t border-gray-100">
    <h3 class="text-xl font-bold text-gray-800 mb-6">Usuários Cadastrados</h3>
    <app-generator-list
      [usersList]="users"
      (editUser)="onUserSelectedForEdit($event)"
    >
      ></app-generator-list
    >
  </div>
</div>
