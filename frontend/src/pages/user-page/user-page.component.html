<div
  class="max-w-3xl mx-auto mt-10 p-8 bg-white rounded-2xl shadow-xl border border-gray-100"
>
  <h2 class="text-3xl font-extrabold text-gray-900 mb-8 border-b pb-4">
    Cadastro de Usuário
  </h2>

  <form [formGroup]="userForm" (ngSubmit)="salvar()">
    <div class="mb-8">
      <label class="block text-sm font-semibold text-gray-700 mb-2"
        >Nome Completo</label
      >
      <input
        type="text"
        formControlName="nome"
        class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
        [ngClass]="
          userForm.get('nome').invalid && userForm.get('nome').touched
            ? 'border-red-500'
            : 'border-gray-300'
        "
        placeholder="Digite o nome completo do usuário"
      />

      <div
        *ngIf="userForm.get('nome').invalid && userForm.get('nome').touched"
        class="text-red-500 text-xs mt-2"
      >
        <p *ngIf="userForm.get('nome').errors.required">
          O nome é obrigatório.
        </p>
        <p *ngIf="userForm.get('nome').errors.minlength">
          O nome deve ter no mínimo 10 caracteres.
        </p>
      </div>
    </div>

    <div class="mb-8">
      <label class="block text-sm font-semibold text-gray-700 mb-4"
        >Perfis de Sistema (Mínimo 1)</label
      >

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div
          *ngFor="let perfil of perfisDisponiveis"
          class="flex items-center p-3 border rounded-lg hover:bg-gray-50 transition cursor-pointer"
        >
          <input
            type="checkbox"
            [value]="perfil"
            (change)="onCheckboxChange($event)"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">{{ perfil }}</span>
        </div>
      </div>

      <div
        *ngIf="perfisFormArray.invalid && userForm.touched"
        class="text-red-500 text-xs mt-3 italic"
      >
        * Selecione ao menos um perfil para este usuário.
      </div>
    </div>

    <div class="flex justify-end pt-6 border-t">
      <button
        type="submit"
        [disabled]="userForm.invalid"
        class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all shadow-lg shadow-indigo-200"
      >
        Finalizar Cadastro
      </button>
    </div>
  </form>
</div>
